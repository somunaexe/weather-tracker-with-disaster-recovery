name: Deploy Weather Tracker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug secrets
        run: |
          echo "EC2 IP length: ${#EC2_IP}"
          echo "SSH KEY length: ${#SSH_KEY}"
        env:
          EC2_IP: ${{ secrets.EC2_PUBLIC_IP }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          cd app/backend
          npm install

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            if [ ! -d "weather-tracker" ]; then
              git clone https://github.com/${{ github.repository }}.git weather-tracker
            else
              cd weather-tracker && git pull
            fi
            cd /home/ubuntu/weather-tracker/app/backend
            npm install
            sudo WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }} \
            S3_BUCKET=weather-tracker-weather-data \
            AWS_REGION=eu-west-2 \
            pm2 restart weather-tracker || \
            sudo WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }} \
            S3_BUCKET=weather-tracker-weather-data \
            AWS_REGION=eu-west-2 \
            pm2 start /home/ubuntu/weather-tracker/app/backend/server.js --name weather-tracker
            sudo pm2 save

      - name: Notify success
        run: echo "Deployed successfully to http://${{ secrets.EC2_PUBLIC_IP }}"
