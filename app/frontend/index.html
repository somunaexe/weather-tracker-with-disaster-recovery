<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .subtitle { opacity: 0.7; margin-bottom: 40px; }
    .search {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 500px;
    }
    input {
      flex: 1;
      padding: 15px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      background: rgba(255,255,255,0.1);
      color: white;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    button {
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #c73652; }
    .weather-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
      display: none;
    }
    .city-name { font-size: 2rem; font-weight: bold; }
    .temp { font-size: 4rem; font-weight: bold; margin: 10px 0; }
    .description { opacity: 0.8; font-size: 1.2rem; text-transform: capitalize; }
    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
    }
    .detail {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 15px;
    }
    .detail-label { opacity: 0.7; font-size: 0.85rem; }
    .detail-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
    .cloud-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-top: 20px;
      background: rgba(255,255,255,0.2);
    }
    .error { color: #e94560; margin-top: 20px; }
    .loading { opacity: 0.7; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>⛅ Weather Tracker</h1>
  <p class="subtitle">Multi-cloud powered weather</p>

  <div class="search">
    <input type="text" id="cityInput" placeholder="Enter a city..." />
    <button onclick="getWeather()">Search</button>
  </div>

  <div class="weather-card" id="weatherCard">
    <div class="city-name" id="cityName"></div>
    <div class="temp" id="temp"></div>
    <div class="description" id="description"></div>
    <div class="details">
      <div class="detail">
        <div class="detail-label">Feels Like</div>
        <div class="detail-value" id="feelsLike"></div>
      </div>
      <div class="detail">
        <div class="detail-label">Humidity</div>
        <div class="detail-value" id="humidity"></div>
      </div>
      <div class="detail">
        <div class="detail-label">Wind Speed</div>
        <div class="detail-value" id="windSpeed"></div>
      </div>
      <div class="detail">
        <div class="detail-label">Last Updated</div>
        <div class="detail-value" id="timestamp"></div>
      </div>
    </div>
    <div class="cloud-badge" id="cloudBadge"></div>
  </div>

  <p class="error" id="error"></p>
  <p class="loading" id="loading"></p>

  <script>
    async function getWeather() {
      const city = document.getElementById("cityInput").value.trim();
      if (!city) return;

      document.getElementById("loading").textContent = "Fetching weather...";
      document.getElementById("error").textContent = "";
      document.getElementById("weatherCard").style.display = "none";

      try {
        const res = await fetch(`/api/weather/${city}`);
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        document.getElementById("cityName").textContent = data.city;
        document.getElementById("temp").textContent = `${Math.round(data.temperature)}°C`;
        document.getElementById("description").textContent = data.description;
        document.getElementById("feelsLike").textContent = `${Math.round(data.feels_like)}°C`;
        document.getElementById("humidity").textContent = `${data.humidity}%`;
        document.getElementById("windSpeed").textContent = `${data.wind_speed} m/s`;
        document.getElementById("timestamp").textContent = new Date(data.timestamp).toLocaleTimeString();
        document.getElementById("cloudBadge").textContent = `☁️ Served from ${data.cloud.toUpperCase()}`;

        document.getElementById("weatherCard").style.display = "block";
        document.getElementById("loading").textContent = "";
      } catch (err) {
        document.getElementById("error").textContent = `Error: ${err.message}`;
        document.getElementById("loading").textContent = "";
      }
    }

    // allow pressing enter to search
    document.getElementById("cityInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") getWeather();
    });
  </script>
</body>
</html>
